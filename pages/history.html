<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robam</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="../imgs/Robam_logo.png"
      type="image/x-icon"
    />
    <!-- tailwind link -->
    <link rel="stylesheet" href="../src/output.css" />
    <!-- aos link -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body class="bg-[#F6F4F4] min-h-screen">
    <!-- navbar -->
    <nav class="w-full py-6">
      <div class="max-w-6xl mx-auto px-4">
        <div
          id="navbar"
          class="relative overflow-hidden bg-white rounded-full h-24 px-8 flex items-center justify-between"
        >
          <div
            id="glow"
            class="absolute w-52 h-52 rounded-full pointer-events-none opacity-0 transition-opacity duration-300 blur-3xl bg-[#C89B3C]/20"
          ></div>

          <div class="relative z-10">
            <a href="../index.html">
              <img
                src="../imgs/Robam_logo.png"
                alt="logo"
                class="w-14 h-14 object-contain"
              />
            </a>
          </div>

          <ul id="nav-menu" class="relative hidden md:flex items-center gap-3">
            <div
              id="nav-indicator"
              class="absolute h-8 rounded-full bg-[#F6F4F4] transition-all duration-300 ease-out"
            ></div>

            <li>
              <a
                href="../index.html"
                class="nav-link relative z-10 px-6 py-3 rounded-full font-medium"
              >
                Home
              </a>
            </li>

            <li>
              <a
                href="../pages/history.html"
                class="nav-link relative z-10 px-6 py-3 rounded-full font-medium"
              >
                History
              </a>
            </li>

            <li>
              <a
                href="../pages/contact.html"
                class="nav-link relative z-10 px-6 py-3 rounded-full font-medium"
              >
                Contact
              </a>
            </li>

            <li>
              <a
                href="../pages/about.html"
                class="nav-link relative z-10 px-6 py-3 rounded-full font-medium"
              >
                About
              </a>
            </li>
          </ul>
          <a
            href="#"
            class="relative z-10 hidden md:flex items-center justify-center px-7 py-3 rounded-full bg-[#C89B3C] text-white font-medium hover:bg-[#B68A35] transition"
          >
            SIGN IN
          </a>
          <button class="relative z-10 md:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-7 h-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- footer -->
    <footer class="bg-[#765420] border-t border-black/10 text-white">
      <div class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid md:grid-cols-3 gap-12">
          <div>
            <img
              src="../imgs/Robam_logo.png"
              alt="Robam Khmer Logo"
              class="w-20 mb-6"
            />

            <h3 class="text-3xl font-bold text-white font-primary">Robam</h3>

            <p class="mt-4 leading-relaxed font-primary">
              «របាំខ្មែរ ព្រលឹងនៃវប្បធម៌ជាតិ»
            </p>
          </div>

          <!-- Navigation -->
          <div>
            <h4 class="font-semibold text-lg mb-5">Explore</h4>

            <ul class="space-y-3">
              <li>
                <a href="../index.html" class="hover:text-[#C89B3C] transition">
                  Home
                </a>
              </li>

              <li>
                <a
                  href="../pages/history.html"
                  class="hover:text-[#C89B3C] transition"
                >
                  History
                </a>
              </li>

              <li>
                <a
                  href="../pages/contact.html"
                  class="hover:text-[#C89B3C] transition"
                >
                  Contact
                </a>
              </li>

              <li>
                <a
                  href="../pages/about.html"
                  class="hover:text-[#C89B3C] transition"
                >
                  About
                </a>
              </li>
            </ul>
          </div>

          <div>
            <h4 class="font-semibold text-lg mb-5 font-primary">មរតកវប្បធម៌</h4>

            <p class="italic leading-relaxed font-primary">
              “រាល់ក្បាច់របាំ និទានរឿងនៃអរិយធម៌ខ្មែរ រាល់ចលនា
              រក្សាទុកព្រលឹងនៃវប្បធម៌ជាតិ”
            </p>
          </div>
        </div>

        <div class="border-t border-black/10 mt-12 pt-8 text-center">
          © 2026 All Right Reserved Robam
        </div>
      </div>
    </footer>
  </body>
  <!-- aos script -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 1000,
      once: true,
    });
  </script>
  <script src="../js/hover.js"></script>
</html>
